<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>MAKERS · _TASKS</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
/* ============================================================
   MAKERS _TASKS  —  색상 컨셉 (여기만 바꾸면 전체 톤이 바뀝니다)
   ============================================================ */
:root{
  /* 진한 브라운 */
  --brown-900:#241710;
  --brown-800:#33231a;
  --brown-700:#43301f;
  --brown-600:#5a4233;
  --cream:#efe7df;          /* 브라운 위 글자 */
  --cream-soft:#b6a596;     /* 브라운 위 보조 글자 */

  /* 화이트(살짝 그레이) */
  --paper:#f1efec;          /* 메인 배경 */
  --paper-2:#fbfaf8;        /* 카드 */
  --paper-3:#e9e6e1;        /* 옅은 칩/바 */
  --line:#e2ded8;
  --line-strong:#cfc8bf;
  --ink:#2a211c;            /* 본문 글자 */
  --ink-soft:#7b6f64;       /* 보조 글자 */

  /* 포인트 컬러 */
  --purple:#7c5cff;
  --green:#2fd98a;          /* 스프링 그린 (민트→그린) */

  /* 우선순위 */
  --p-high:#ff6b6b;
  --p-mid:#ffb23e;
  --p-low:#9aa6a0;

  --radius:14px;
  --shadow:0 1px 2px rgba(36,23,16,.04), 0 6px 20px rgba(36,23,16,.06);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;
}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
::selection{background:color-mix(in srgb,var(--purple) 25%,white)}

.app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}

/* ---------- 사이드바 ---------- */
.sidebar{
  background:var(--brown-800);
  color:var(--cream);display:flex;flex-direction:column;
  padding:20px 14px;gap:6px;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:9px;padding:4px 8px 16px}
.brand .logo{display:flex;gap:3px}
.brand .logo i{width:9px;height:9px;border-radius:50%;display:block}
.brand .logo i:nth-child(1){background:var(--green)}
.brand .logo i:nth-child(2){background:var(--purple)}
.brand b{font-size:15px;letter-spacing:.5px}
.brand span{color:var(--cream-soft);font-size:12px;font-weight:600;letter-spacing:1px}

.side-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--cream-soft);
  padding:14px 8px 6px;text-transform:uppercase}

.proj-nav{display:flex;flex-direction:column;gap:2px}
.proj-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;
  padding:9px 10px;border-radius:10px;color:var(--cream);transition:.13s;position:relative}
.proj-item:hover{background:rgba(255,255,255,.06)}
.proj-item.active{background:rgba(255,255,255,.11)}
.proj-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;
  border-radius:3px;background:var(--pc,var(--green))}
.proj-item .pi-dot{width:9px;height:9px;border-radius:50%;background:var(--pc);flex:0 0 auto}
.proj-item .pi-name{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-item .pi-cnt{font-size:11px;color:var(--cream-soft);font-weight:700;
  background:rgba(0,0,0,.22);border-radius:999px;padding:1px 7px;min-width:20px;text-align:center}
.proj-item .pi-del{opacity:0;color:var(--cream-soft);font-size:15px;line-height:1;
  padding:0 2px;border-radius:4px;transition:.13s}
.proj-item:hover .pi-del{opacity:.7}
.proj-item .pi-del:hover{opacity:1;color:#ff8e8e}
.proj-item .pi-share{opacity:0;color:var(--cream-soft);font-size:13px;line-height:1;
  padding:0 3px;border-radius:4px;transition:.13s}
.proj-item:hover .pi-share{opacity:.7}
.proj-item .pi-share:hover{opacity:1;color:var(--green)}

.proj-add-btn{margin-top:4px;padding:9px 10px;border-radius:10px;color:var(--cream-soft);
  font-weight:600;text-align:left;transition:.13s;border:1px dashed rgba(255,255,255,.16)}
.proj-add-btn:hover{color:var(--cream);border-color:rgba(255,255,255,.32);background:rgba(255,255,255,.04)}
.proj-add{display:flex;gap:6px;margin-top:4px}
.proj-add input{flex:1;min-width:0;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.14);
  border-radius:9px;padding:8px 10px;color:var(--cream);outline:none}
.proj-add input::placeholder{color:var(--cream-soft)}
.proj-add input:focus{border-color:var(--green)}
.proj-add button{flex:0 0 auto;white-space:nowrap;background:var(--green);color:#06301d;font-weight:700;border-radius:9px;padding:8px 14px}

.side-foot{margin-top:auto;padding-top:16px}
.side-stat{font-size:12px;color:var(--cream-soft);padding:0 8px 10px;font-weight:600}
.side-stat b{color:var(--cream)}
.data-btns{display:flex;gap:5px;padding:0 4px}
.data-btns button{flex:1;font-size:11.5px;font-weight:700;color:var(--cream-soft);
  border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:7px 4px;transition:.13s}
.data-btns button:hover{color:var(--cream);border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
.hint{font-size:10.5px;color:var(--cream-soft);opacity:.7;padding:10px 8px 0;line-height:1.55}

/* ---------- 메인 ---------- */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:18px 26px 0;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:var(--paper-3);padding:4px;border-radius:11px}
.tab{padding:7px 15px;border-radius:8px;font-weight:700;color:var(--ink-soft);transition:.13s;font-size:13px}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--paper-2);color:var(--ink);box-shadow:0 1px 3px rgba(36,23,16,.1)}

.topbar .spacer{flex:1}
.search{position:relative}
.search input{background:var(--paper-2);border:1px solid var(--line);border-radius:10px;
  padding:8px 12px 8px 32px;width:170px;outline:none;transition:.13s}
.search input:focus{border-color:var(--purple);width:200px}
.search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.5}
.donetoggle{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);
  font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
.donetoggle input{width:15px;height:15px;accent-color:var(--purple);cursor:pointer}

/* 날짜 네비 */
.datenav{display:flex;align-items:center;gap:8px;padding:16px 26px 0}
.datenav button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
  background:var(--paper-2);font-size:17px;color:var(--ink-soft);transition:.13s;line-height:1}
.datenav button:hover{border-color:var(--line-strong);color:var(--ink)}
.datelabel{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:800;letter-spacing:-.3px}
.daybadge{font-size:11px;font-weight:800;color:var(--purple);
  background:color-mix(in srgb,var(--purple) 12%,white);padding:3px 9px;border-radius:999px;letter-spacing:0}
.today-btn{width:auto!important;padding:0 12px;font-size:13px!important;font-weight:700;
  color:var(--green-ink,#0d7a4d)!important}
.datepick{margin-left:auto;border:1px solid var(--line);background:var(--paper-2);
  border-radius:9px;padding:7px 10px;color:var(--ink-soft);outline:none;cursor:pointer}
.datepick:focus{border-color:var(--purple)}

/* 추가바 */
.addbar{display:flex;gap:8px;padding:16px 26px 4px;flex-wrap:wrap}
.addbar input#addText{flex:1;min-width:200px;background:var(--paper-2);border:1px solid var(--line);
  border-radius:11px;padding:12px 15px;outline:none;transition:.13s;font-size:14.5px}
.addbar input#addText:focus{border-color:var(--purple);box-shadow:0 0 0 3px color-mix(in srgb,var(--purple) 12%,transparent)}
.addbar select{background:var(--paper-2);border:1px solid var(--line);border-radius:11px;
  padding:0 10px;outline:none;cursor:pointer;font-weight:600;color:var(--ink-soft)}
.addbar select:focus{border-color:var(--purple)}
.add-btn{flex:0 0 auto;white-space:nowrap;background:var(--ink);color:var(--paper-2);font-weight:700;border-radius:11px;padding:0 20px;transition:.13s}
.add-btn:hover{background:#000}

/* 리스트 */
.listwrap{flex:1;overflow-y:auto;padding:10px 26px 60px}
.prog{display:flex;align-items:center;gap:11px;margin:8px 2px 16px}
.progbar{flex:1;height:8px;background:var(--paper-3);border-radius:999px;overflow:hidden}
.progbar i{display:block;height:100%;border-radius:999px;transition:width .35s ease;
  background:var(--green)}
.progtxt{font-size:12px;color:var(--ink-soft);font-weight:700;white-space:nowrap}

.section-h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;
  color:var(--ink-soft);margin:24px 2px 9px}
.section-h .dot{width:10px;height:10px;border-radius:50%}
.section-h .cnt{background:var(--paper-3);border-radius:999px;padding:1px 8px;font-size:11px}
.section-h.backlog{color:#9a7b43}

.task{display:flex;align-items:center;gap:11px;background:var(--paper-2);border:1px solid var(--line);
  border-radius:var(--radius);padding:13px 14px;margin-bottom:8px;box-shadow:var(--shadow);
  transition:.14s;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.task:hover{border-color:var(--line-strong)}
.task.done{background:#f6f4f1;border-color:transparent;box-shadow:none}
.task.done .ttext{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--line-strong)}

.check{width:22px;height:22px;border-radius:50%;border:2px solid var(--line-strong);
  flex:0 0 auto;position:relative;transition:.15s}
.check:hover{border-color:var(--green)}
.check::after{content:'';position:absolute;left:6px;top:2.5px;width:5px;height:10px;
  border:2px solid #fff;border-top:0;border-left:0;transform:rotate(45deg) scale(0);
  transform-origin:center;transition:transform .15s ease}
.task.done .check{background:var(--green);border-color:var(--green)}
.task.done .check::after{transform:rotate(45deg) scale(1)}

.pdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.pdot.high{background:var(--p-high)} .pdot.mid{background:var(--p-mid)} .pdot.low{background:var(--p-low)}

.ttext{flex:1;cursor:text;word-break:break-word;font-weight:500;display:flex;align-items:center;gap:6px}
.noteicon{font-size:12px;cursor:help;filter:saturate(.4)}

.pill{font-size:11.5px;padding:3px 9px;border-radius:999px;white-space:nowrap;font-weight:700;flex:0 0 auto}
.pill.proj{color:var(--pc);background:color-mix(in srgb,var(--pc) 15%,white)}
.pill.proj.etc{color:var(--ink-soft);background:var(--paper-3)}
.pill.date{color:var(--ink-soft);background:var(--paper-3)}
.pill.date.none{color:#a06b9a;background:color-mix(in srgb,#a06b9a 12%,white)}
.pill.range{color:var(--purple);background:color-mix(in srgb,var(--purple) 13%,white)}
.pill.range b{font-weight:800;opacity:.6;margin-left:3px}
.pill.carry{color:#9a6a00;background:color-mix(in srgb,var(--p-mid) 24%,white)}
.pill.carry b{font-weight:800;margin-left:2px}

.acts{display:flex;align-items:center;gap:3px;opacity:0;transition:.13s;flex:0 0 auto}
.task:hover .acts,.task:focus-within .acts{opacity:1}
.iconbtn{width:30px;height:30px;border-radius:8px;font-size:14px;color:var(--ink-soft);transition:.12s;line-height:1}
.iconbtn:hover{background:var(--paper-3);color:var(--ink)}
.iconbtn.post{font-weight:800}
@media(hover:none){.acts{opacity:1}}

/* 드래그 순서 변경 */
.grip{flex:0 0 auto;cursor:grab;color:var(--line-strong);font-size:15px;line-height:1;padding:0 1px;
  user-select:none;opacity:.55;transition:.12s;letter-spacing:-2px}
.grip:hover{opacity:1;color:var(--ink-soft)}
.grip:active{cursor:grabbing}
.task.dragging{opacity:.4}
.task.drop-before{box-shadow:inset 0 3px 0 -1px var(--purple)}
.task.drop-after{box-shadow:inset 0 -3px 0 -1px var(--purple)}

/* 인라인 편집 */
.task.editing{display:block;border-color:var(--purple);box-shadow:0 0 0 3px color-mix(in srgb,var(--purple) 10%,transparent)}
.editform{display:flex;flex-direction:column;gap:9px}
.editform .ef-text{border:1px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;font-weight:600}
.editform .ef-text:focus{border-color:var(--purple)}
.ef-row{display:flex;gap:8px;flex-wrap:wrap}
.ef-row select,.ef-row input{border:1px solid var(--line);border-radius:9px;padding:8px 10px;
  outline:none;background:var(--paper-2);font-weight:600;color:var(--ink-soft)}
.ef-row select:focus,.ef-row input:focus{border-color:var(--purple)}
.ef-row .ef-tilde{display:inline-flex;align-items:center;color:var(--ink-soft);font-weight:800;padding:0 1px}
.ef-note{border:1px solid var(--line);border-radius:9px;padding:9px 12px;outline:none;
  resize:vertical;min-height:54px;font-family:inherit}
.ef-note:focus{border-color:var(--purple)}
.ef-acts{display:flex;gap:7px;align-items:center}
.btn{padding:8px 16px;border-radius:9px;font-weight:700;border:1px solid var(--line);background:var(--paper-2);transition:.12s}
.btn:hover{border-color:var(--line-strong)}
.btn.primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn.primary:hover{filter:brightness(1.05)}
.btn.danger{margin-left:auto;color:#d4524f;border-color:transparent}
.btn.danger:hover{background:color-mix(in srgb,#d4524f 10%,white)}

/* 빈 상태 */
.empty{text-align:center;padding:54px 20px;color:var(--ink-soft)}
.empty .em{font-size:42px;opacity:.85}
.empty h3{margin:14px 0 5px;font-size:15px;color:var(--ink);font-weight:700}
.empty p{font-size:13px}

/* 토스트 */
#toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);
  background:var(--ink);color:var(--paper-2);padding:11px 20px;border-radius:11px;
  font-weight:600;font-size:13.5px;box-shadow:0 8px 30px rgba(0,0,0,.25);
  opacity:0;pointer-events:none;transition:.25s;z-index:50}
#toast.show{opacity:1;transform:translate(-50%,0)}

/* 반응형 */
@media(max-width:760px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{flex-direction:row;flex-wrap:wrap;align-items:center;padding:12px 14px;gap:8px;overflow:visible}
  .brand{padding:0 6px 0 2px}
  .side-label{display:none}
  .proj-nav{flex-direction:row;flex-wrap:wrap;flex:1;gap:6px}
  .proj-item{width:auto;padding:7px 11px}
  .proj-item.active::before{display:none}
  .proj-item .pi-del,.proj-item .pi-share{display:none}
  .proj-add-btn{margin:0}
  .proj-add{order:5}
  .side-foot{margin:0;padding:0;display:flex;align-items:center;gap:10px;width:100%}
  .side-stat{padding:0;white-space:nowrap}
  .hint{display:none}
  .topbar,.datenav,.addbar,.listwrap{padding-left:16px;padding-right:16px}
  .datepick{margin-left:0}
}

/* ---------- 계정/로그아웃 행 (원격 모드 로그인 시) ---------- */
.acct{display:flex;align-items:center;gap:8px;padding:0 4px 10px;font-size:11.5px;color:var(--cream-soft);font-weight:600}
.acct[hidden]{display:none}
.acct-email{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-out{color:var(--cream-soft);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:5px 9px;font-weight:700;white-space:nowrap}
.acct-out:hover{color:var(--cream);border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
/* 프로젝트 추가 폼: 이름은 한 줄 전체, 공유선택+추가는 다음 줄 */
.proj-add{flex-wrap:wrap}
.proj-add #projName{flex:1 0 100%}
.proj-add select{flex:1;min-width:0;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:8px 8px;color:var(--cream);outline:none;font-weight:600}
.proj-add select:focus{border-color:var(--green)}
.pi-lock{opacity:.65;font-size:10px;margin-left:2px}

/* ---------- 로그인 화면 (기본 숨김 · 로컬 모드에선 절대 표시 안 됨) ---------- */
.loginscreen{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:var(--paper);padding:20px}
.loginscreen[hidden]{display:none}
.login-card{width:340px;max-width:100%;display:flex;flex-direction:column;gap:12px;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}
.login-brand{justify-content:center;padding:0 0 6px}
.login-card h2{font-size:18px;font-weight:800;color:var(--ink);text-align:center}
.login-card input{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px 14px;outline:none;transition:.13s}
.login-card input:focus{border-color:var(--purple);box-shadow:0 0 0 3px color-mix(in srgb,var(--purple) 12%,transparent)}
.login-err{color:#d4524f;font-size:12.5px;font-weight:600;text-align:center}
.login-err[hidden]{display:none}
.login-toggle{color:var(--purple);font-weight:700;font-size:12.5px;padding:4px}
.login-card select{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 13px;outline:none;font:inherit;color:var(--ink)}
.login-card select:focus{border-color:var(--purple);box-shadow:0 0 0 3px color-mix(in srgb,var(--purple) 12%,transparent)}
.share-members{max-height:230px;overflow:auto;display:flex;flex-direction:column;gap:7px;border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--paper)}
.share-members[hidden]{display:none}
.share-members label{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink);cursor:pointer;line-height:1.3}
.share-members input{width:16px;height:16px;accent-color:var(--purple);flex:0 0 auto}
.share-members .empty-dir{color:#9aa6a0;font-size:12.5px;text-align:center;padding:6px 0}

/* ---------- 세그먼트(항목 필터 · 기간) ---------- */
.segbar{display:flex;gap:4px;background:var(--paper-3);padding:3px;border-radius:9px}
.segbar button{padding:6px 12px;border-radius:7px;font-weight:700;font-size:12px;color:var(--ink-soft);transition:.12s;white-space:nowrap;line-height:1}
.segbar button:hover{color:var(--ink)}
.segbar button.active{background:var(--paper-2);color:var(--ink);box-shadow:0 1px 2px rgba(36,23,16,.12)}

/* ---------- 추가바: 일정 시간 입력 ---------- */
.addbar input[type=time]{background:var(--paper-2);border:1px solid var(--line);border-radius:11px;padding:0 10px;outline:none;font-weight:600;color:var(--ink-soft)}
.addbar input[type=time]:focus{border-color:var(--purple)}

/* ---------- 일정(event) 카드 ---------- */
.task.event{background:color-mix(in srgb,var(--purple) 5%,var(--paper-2));border-color:color-mix(in srgb,var(--purple) 20%,var(--line))}
.task.event:hover{border-color:color-mix(in srgb,var(--purple) 35%,var(--line))}
.evmark{width:22px;height:22px;border-radius:7px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  font-size:12px;background:color-mix(in srgb,var(--purple) 16%,white)}
.pill.time{color:var(--purple);background:color-mix(in srgb,var(--purple) 15%,white);font-weight:800}

/* ---------- 주 뷰(요일 7열 그리드 · 한눈에) ---------- */
.wk{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px;align-items:stretch}
.wk-col{border:1px solid var(--line);border-radius:10px;background:var(--paper-2);display:flex;flex-direction:column;min-height:220px;overflow:hidden}
.wk-col.today{border-color:var(--purple);box-shadow:0 0 0 2px color-mix(in srgb,var(--purple) 16%,transparent)}
.wk-head{padding:7px 9px;border-bottom:1px solid var(--line);background:var(--paper-3);cursor:pointer;
  display:flex;flex-direction:column;gap:1px;transition:.12s}
.wk-head:hover{background:var(--paper-3);filter:brightness(.98)}
.wk-head .d{font-weight:800;font-size:15px;color:var(--ink);line-height:1.1}
.wk-head .wd{font-size:11px;color:var(--ink-soft);font-weight:700}
.wk-head .sun{color:#d4524f}.wk-head .sat{color:#4b7bd4}
.wk-col.today .wk-head{background:color-mix(in srgb,var(--purple) 11%,white)}
.wk-col.today .wk-head .d,.wk-col.today .wk-head .wd{color:var(--purple)}
.wk-body{padding:6px;display:flex;flex-direction:column;gap:4px;flex:1}
.wk-item{display:flex;align-items:center;gap:5px;font-size:11.5px;line-height:1.3;
  padding:4px 6px;border-radius:7px;border-left:3px solid var(--pc,var(--line-strong));
  background:var(--paper-3);cursor:pointer;transition:.1s}
.wk-item:hover{filter:brightness(.97)}
.wk-item.ev{border-left-color:var(--purple);background:color-mix(in srgb,var(--purple) 9%,white)}
.wk-item.done{opacity:.5}
.wk-item.done .wk-t{text-decoration:line-through;text-decoration-color:var(--line-strong)}
.wk-t{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.wk-check{width:14px;height:14px;border-radius:50%;border:2px solid var(--line-strong);flex:0 0 auto;position:relative;transition:.12s}
.wk-check:hover{border-color:var(--green)}
.wk-check::after{content:'';position:absolute;left:3px;top:.5px;width:3.5px;height:7px;border:2px solid #fff;border-top:0;border-left:0;transform:rotate(45deg) scale(0);transition:transform .12s}
.wk-item.done .wk-check{background:var(--green);border-color:var(--green)}
.wk-item.done .wk-check::after{transform:rotate(45deg) scale(1)}
.wk-time{font-weight:800;color:var(--purple);flex:0 0 auto;font-size:10.5px}
.wk-empty{color:var(--ink-soft);opacity:.35;font-size:12px;text-align:center;padding:10px 0}
@media(max-width:760px){
  .wk{gap:3px}
  .wk-col{min-height:120px;border-radius:8px}
  .wk-head{padding:4px 5px}
  .wk-head .d{font-size:12px}.wk-head .wd{font-size:9.5px}
  .wk-body{padding:3px;gap:3px}
  .wk-item{font-size:9.5px;padding:2px 4px;gap:3px}
  .wk-check{width:12px;height:12px}
}

/* ---------- 월 뷰(달력 그리드) ---------- */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.cal-wd{text-align:center;font-size:11px;font-weight:800;color:var(--ink-soft);padding:2px 0 4px;letter-spacing:.5px}
.cal-wd.sun{color:#d4524f}.cal-wd.sat{color:#4b7bd4}
.cal-cell{min-height:106px;border:1px solid var(--line);border-radius:10px;background:var(--paper-2);
  padding:5px 6px;cursor:pointer;transition:.12s;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.cal-cell:hover{border-color:var(--line-strong);box-shadow:var(--shadow)}
.cal-cell.blank{background:transparent;border:none;cursor:default;box-shadow:none}
.cal-cell.today{border-color:var(--purple);box-shadow:0 0 0 2px color-mix(in srgb,var(--purple) 16%,transparent)}
.cal-daynum{font-size:12px;font-weight:800;color:var(--ink);line-height:1;margin-bottom:1px}
.cal-cell.today .cal-daynum{color:var(--purple)}
.cal-daynum.sun{color:#d4524f}.cal-daynum.sat{color:#4b7bd4}
.cal-cell.today .cal-daynum.sun,.cal-cell.today .cal-daynum.sat{color:var(--purple)}
.cal-chip{font-size:10.5px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  padding:1px 5px;border-radius:5px;border-left:3px solid var(--pc,var(--line-strong));background:var(--paper-3);color:var(--ink)}
.cal-chip.done{opacity:.5;text-decoration:line-through}
.cal-chip.ev{border-left-color:var(--purple);background:color-mix(in srgb,var(--purple) 11%,white);font-weight:700}
.cal-more{font-size:10px;color:var(--ink-soft);font-weight:700;padding-left:2px}
@media(max-width:760px){
  .cal{gap:3px}
  .cal-cell{min-height:64px;padding:3px 4px;border-radius:8px}
  .cal-chip{font-size:9px;padding:0 3px}
  .cal-daynum{font-size:11px}
}

<script>
"use strict";
const PROJECT_COLORS=['#7c5cff','#2fd98a','#ff8a5c','#ffc24b','#4bc0ff','#ff6b9d','#9b7bff','#3dd6c0','#ff6b6b','#5ac8fa'];
const PRI_EMOJI={high:'🔴',mid:'🟡',low:'🟢'};
const WD=['일','월','화','수','목','금','토'];

/* ---------- 유틸 ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function ymd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseYmd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtDateKo(s){const d=parseYmd(s);return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${WD[d.getDay()]})`;}
function fmtShort(s){const d=parseYmd(s);return `${d.getMonth()+1}.${d.getDate()} (${WD[d.getDay()]})`;}
function relLabel(s){const t=ymd(new Date());if(s===t)return '오늘';const d=parseYmd(t);d.setDate(d.getDate()+1);if(s===ymd(d))return '내일';d.setDate(d.getDate()-2);if(s===ymd(d))return '어제';return '';}
function md(s){const d=parseYmd(s);return `${d.getMonth()+1}.${d.getDate()}`;}
function dateDiff(a,b){return Math.round((parseYmd(b)-parseYmd(a))/86400000);}
const todayYmd=()=>ymd(new Date());
/* 표시상 '실제 종료일': ①사용자가 지정한 기간 ②미완료+과거시작 → 오늘까지 자동 연장 ③완료/단일 → 자기 날짜까지만(완료하면 오늘로 끌어오지 않음) */
function effEnd(t){
  if(!t.date)return null;
  if(t.endDate&&t.endDate>t.date)return t.endDate;        // 지정 기간(완료 여부 무관)
  if(t.type!=='event'&&!t.done){const ty=todayYmd();if(t.date<ty)return ty;} // '할 일' 미완료 + 과거 시작 → 오늘까지 자동 연장(일정은 과거에 그대로 둠)
  return t.date;                                           // 완료/단일/일정 → 시작일까지만
}
/* 작업이 날짜 sd에 표시되는가 (시작~실제종료 사이 모든 날) */
function spansDate(t,sd){if(!t.date)return false;const end=effEnd(t);return t.date<=sd&&sd<=end;}
/* 카드 날짜 배지 정보. kind: none | single | range(지정기간) | carry(자동연장 미완료) */
function dateMeta(t){
  if(!t.date)return{kind:'none'};
  const explicit=!!(t.endDate&&t.endDate>t.date);
  const end=effEnd(t);
  if(end<=t.date)return{kind:'single'};
  const total=dateDiff(t.date,end)+1;
  let idx=dateDiff(t.date,state.ui.selectedDate)+1;if(idx<1)idx=1;if(idx>total)idx=total;
  const carry=!explicit&&!t.done;
  return{kind:carry?'carry':'range',total,idx,short:`${md(t.date)}~${md(end)}`,startKo:fmtShort(t.date),endKo:fmtShort(end)};
}

/* ---------- 상태 ---------- */
function defaultState(){
  const p1=uid(),p2=uid();
  return{
    tasks:[],
    projects:[{id:p1,name:'랜딩',color:'#7c5cff',shared:true,members:[]},{id:p2,name:'간판',color:'#2fd98a',shared:true,members:[]}],
    ui:{view:'date',period:'day',itemFilter:'all',selectedDate:ymd(new Date()),projectFilter:'all',showDone:true,search:'',editingId:null}
  };
}
function migrate(s){
  s.tasks=Array.isArray(s.tasks)?s.tasks:[];
  s.projects=Array.isArray(s.projects)?s.projects:[];
  s.ui=Object.assign({view:'date',period:'day',itemFilter:'all',selectedDate:ymd(new Date()),projectFilter:'all',showDone:true,search:'',editingId:null},s.ui||{});
  s.ui.selectedDate=ymd(new Date()); // 열 때 항상 오늘로
  s.ui.editingId=null; s.ui.search='';
  if(['day','week','month'].indexOf(s.ui.period)<0)s.ui.period='day';
  if(['all','task','event'].indexOf(s.ui.itemFilter)<0)s.ui.itemFilter='all';
  s.tasks.forEach(t=>{t.priority=t.priority||'mid';t.note=t.note||'';t.type=(t.type==='event'?'event':'task');if(!('time'in t))t.time=null;if(!('date'in t))t.date=null;if(!('endDate'in t))t.endDate=null;if(!('doneAt'in t))t.doneAt=null;});
  s.projects.forEach(p=>{if(!('shared'in p))p.shared=true; if(!Array.isArray(p.members))p.members=[];}); // 기존 프로젝트는 팀 공유로 기본값
  return s;
}
/* ---------- 백엔드 설정 ----------
   REMOTE=true → Supabase 클라우드(로그인·기기간 동기화). false → 이 브라우저 로컬 전용.
   publishable 키는 공개용이라 노출돼도 안전(RLS + anon 권한 없음으로 보호). */
const SUPABASE_URL='https://bmejvuxyszbibjdegnxz.supabase.co';
const SUPABASE_KEY='sb_publishable_GbCZImWWSbQhBp1m5BPq6A_-QBcFLMz';
const REMOTE=true;

/* ---------- 저장소 추상화(Store) ----------
   앱 전체에서 localStorage를 직접 만지는 '유일한' 곳. 백엔드 어댑터(Supabase REST)도 여기 안에.
   렌더/이벤트/시드 코드는 모드와 무관하게 그대로 동작합니다.
   - 동기화 대상 데이터(tasks/projects)  → DATA_KEY
   - 기기별 로컬 환경설정(ui + 마이그레이션 플래그) → PREFS_KEY (서버로 안 올라감)
   - 인증 토큰 → AUTH_KEY (로컬 전용)
   _data/_prefs 는 '한 번 만들고 영원히 제자리(in-place)로만' 변경 — 재할당 금지. */
const Store = (function(){
  const DATA_KEY='makers_tasks_v1', PREFS_KEY='makers_ui_v1', AUTH_KEY='makers_auth_v1';
  let _mode = REMOTE ? 'remote' : 'local';   // 'local' | 'remote'
  const _data={tasks:[],projects:[]};        // 한 번 생성, 절대 재할당 안 함
  let _prefs={};                             // init()에서 1회 할당, 이후 제자리 변경
  let _batch=0;
  let _tok=null, _me=null, _dir=null, _onChange=null;
  const enc=encodeURIComponent;
  // ---- 필드 매핑 (앱 객체 ↔ Supabase 행: text↔title, date↔start_date 등) ----
  function taskToRow(t){ return {id:t.id,title:t.text,type:(t.type==='event'?'event':'task'),project:t.project||null,priority:t.priority||'mid',done:!!t.done,start_date:t.date||null,end_date:t.endDate||null,event_time:t.time||null,done_at:t.doneAt||null,note:t.note||'',sort:(typeof t.sort==='number'?t.sort:null)}; }
  function taskPatchToRow(p){ const r={}; if('text'in p)r.title=p.text; if('type'in p)r.type=(p.type==='event'?'event':'task'); if('project'in p)r.project=p.project||null; if('priority'in p)r.priority=p.priority; if('done'in p)r.done=!!p.done; if('date'in p)r.start_date=p.date||null; if('endDate'in p)r.end_date=p.endDate||null; if('time'in p)r.event_time=p.time||null; if('doneAt'in p)r.done_at=p.doneAt||null; if('note'in p)r.note=p.note||''; if('sort'in p)r.sort=p.sort; return r; }
  function rowToTask(r){ return {id:r.id,text:r.title,type:(r.type==='event'?'event':'task'),project:r.project||'none',priority:r.priority||'mid',done:!!r.done,createdAt:r.created_at?Date.parse(r.created_at):Date.now(),date:r.start_date||null,endDate:r.end_date||null,time:r.event_time||null,doneAt:r.done_at||null,note:r.note||'',sort:(typeof r.sort==='number'?r.sort:null)}; }
  function projToRow(p){ return {id:p.id,name:p.name,color:p.color||null,shared:p.shared!==false,members:Array.isArray(p.members)?p.members:[]}; }
  function projPatchToRow(p){ const r={}; if('name'in p)r.name=p.name; if('color'in p)r.color=p.color; if('shared'in p)r.shared=!!p.shared; if('members'in p)r.members=Array.isArray(p.members)?p.members:[]; return r; }
  function rowToProj(r){ return {id:r.id,name:r.name,color:r.color,shared:r.shared!==false,members:Array.isArray(r.members)?r.members:[],owner:r.owner||null}; }
  // ---- 인증 토큰 (AUTH_KEY · 로컬 전용 저장) ----
  function decodeJwt(t){ try{ let p=(t||'').split('.')[1]; if(!p)return null; p=p.replace(/-/g,'+').replace(/_/g,'/'); p+='='.repeat((4-p.length%4)%4); return JSON.parse(atob(p)); }catch(e){ return null; } }
  function loadTok(){ _tok=lsGet(AUTH_KEY); if(_tok&&_tok.access_token&&(!_tok.uid||!_tok.email)){ const o=decodeJwt(_tok.access_token); if(o){ if(!_tok.uid)_tok.uid=o.sub||null; if(!_tok.email)_tok.email=o.email||null; lsSet(AUTH_KEY,_tok); } } }

  function fail(msg){ toast(msg||'동기화 실패 — 새로고침 해주세요'); pull().then(()=>{ if(_onChange)_onChange(); }).catch(()=>{}); }

  const findById=(arr,id)=>arr.find(x=>x.id===id);
  function entity(coll,table,toRow,patchToRow,fromRow){
    return {

    bulk(fn){ _batch++; try{ fn(); } finally { if(--_batch===0){ persistData(); persistPrefs(); } } }, // 끝에서 data+prefs 한 번씩 기록(시드의 직접 push + repo 호출 모두 커버)
    importState(parsed){ const s=migrate(parsed);
      _data.tasks.length=0;    _data.tasks.push.apply(_data.tasks,s.tasks);

    snapshot(){ return {tasks:_data.tasks, projects:_data.projects, ui:_prefs}; }, // 내보내기 = 오늘과 동일한 결합 형태

function visibleTasks(){
  let t=state.tasks.slice();
  if(state.ui.projectFilter!=='all')t=t.filter(x=>x.project===state.ui.projectFilter);
  const itf=state.ui.itemFilter||'all';
  if(itf==='task')t=t.filter(x=>x.type!=='event');
  else if(itf==='event')t=t.filter(x=>x.type==='event');
  if(state.ui.search){const q=state.ui.search.toLowerCase();t=t.filter(x=>x.text.toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q));}
  if(!state.ui.showDone)t=t.filter(x=>!x.done);   // 일정은 done=false라 항상 남음
  return t;
}
const isEvent=t=>t.type==='event';
function projOrder(pid){const i=state.projects.findIndex(p=>p.id===pid);return i<0?9999:i;}
/* 하루/전체 목록 정렬: ①일정을 위로(시간순) ②그다음 할 일 — 완료는 맨 아래, 미완료는 프로젝트별 */
function cmpItems(a,b){
  const ae=isEvent(a),be=isEvent(b);
  if(ae!==be)return ae?-1:1;
  if(ae&&be){const at=a.time||'99:99',bt=b.time||'99:99';return at!==bt?(at<bt?-1:1):0;}
  if(a.done!==b.done)return a.done?1:-1;            // 완료된 할 일 → 아래
  const pa=projOrder(a.project),pb=projOrder(b.project);
  if(pa!==pb)return pa-pb;                          // 프로젝트별
  return 0;                                         // 안정정렬: 수동 드래그 순서 유지
}
/* 프로젝트 그룹 안(여러 날짜 혼재): 완료된 '할 일'만 맨 아래, 나머지는 날짜·시간순 */
function cmpProjGroup(a,b){
  const ad=(!isEvent(a)&&a.done)?1:0,bd=(!isEvent(b)&&b.done)?1:0;
  if(ad!==bd)return ad-bd;
  const asd=a.date||'9999',bsd=b.date||'9999';
  if(asd!==bsd)return asd<bsd?-1:1;
  const at=a.time||'99:99',bt=b.time||'99:99';
  return at!==bt?(at<bt?-1:1):0;
}

function progressHTML(list){

/* mode: 'day'(날짜별-일 · grip/미루기/기간 진행표시) | 'full'(프로젝트별·전체 · 날짜 전부) | 'compact'(주 뷰 · 날짜배지 최소) */

  const carryPill=b=>`<span class="pill carry" title="${dm.startKo}에 시작한 미완료 — 완료할 때까지 오늘로 자동 연장">⏳ ${md(t.date)}부터${b?` <b>${dm.total}일째</b>`:''}</span>`;

  const grip=(mode==='day'&&!ev)?`<span class="grip" title="드래그해서 순서 변경" aria-hidden="true">⠿</span>`:'';

const cardOrEdit=(t,mode)=>state.ui.editingId===t.id?editHTML(t):cardHTML(t,{mode:mode||'full'});

function renderList(){
  const view=state.ui.view,visible=visibleTasks();
  let html='';
  if(view==='date'){
    const period=state.ui.period||'day';
    if(period==='week')html=renderWeek(visible);
    else if(period==='month')html=renderMonth(visible);
    else html=renderDay(visible);
  }else if(view==='project'){
    const projs=state.ui.projectFilter==='all'?state.projects:state.projects.filter(p=>p.id===state.ui.projectFilter);
    const groups=projs.map(p=>({p,list:visible.filter(t=>t.project===p.id)}));
    if(state.ui.projectFilter==='all'){
      const none=visible.filter(t=>!state.projects.find(p=>p.id===t.project));
      if(none.length)groups.push({p:{id:'none',name:'기타',color:'#9aa6a0'},list:none});
    }
    const ne=groups.filter(g=>g.list.length);
    if(!ne.length)html+=emptyHTML('항목이 없어요','');
    for(const g of ne){
      g.list.sort(cmpProjGroup);   // 완료된 할 일은 그룹 맨 아래, 나머지는 날짜·시간순
      html+=`<div class="section-h"><span class="dot" style="background:${g.p.color}"></span>${esc(g.p.name)} <span class="cnt">${g.list.length}</span></div>`;
      html+=progressHTML(g.list)+g.list.map(t=>cardOrEdit(t,'full')).join('');
    }
  }else{ // all — 프로젝트별로 묶고, 그룹 안에서 완료는 아래로
    const list=visible.slice().sort((a,b)=>{const pa=projOrder(a.project),pb=projOrder(b.project);return pa!==pb?pa-pb:cmpProjGroup(a,b);});
    html+=progressHTML(list);
    html+=list.length?list.map(t=>cardOrEdit(t,'full')).join(''):emptyHTML('항목이 없어요','');
  }
  listContainer.innerHTML=html;
}
function renderDay(visible){
  const sd=state.ui.selectedDate;
  const day=visible.filter(t=>spansDate(t,sd)).sort(cmpItems);
  let html=progressHTML(day);
  html+=day.length?day.map(t=>cardOrEdit(t,'day')).join(''):emptyHTML('이 날에 항목이 없어요','아래에서 할 일이나 일정을 추가해 보세요');
  const backlog=visible.filter(t=>!t.date&&(isEvent(t)||!t.done)).sort(cmpItems);
  if(backlog.length){
    html+=`<div class="section-h backlog">📥 날짜 미정 <span class="cnt">${backlog.length}</span></div>`;
    html+=backlog.map(t=>cardOrEdit(t,'full')).join('');
  }
  return html;
}
function weekItemHTML(t,ds){
  const p=projectById(t.project),ev=isEvent(t);
  const pc=p.real?p.color:'var(--line-strong)';
  const lead=ev
    ? `<span class="wk-time">${t.time?esc(t.time):'📅'}</span>`
    : `<button class="wk-check" data-action="toggle" data-id="${t.id}" aria-label="완료 토글"></button>`;
  return `<div class="wk-item${ev?' ev':''}${(!ev&&t.done)?' done':''}" style="--pc:${pc}" data-action="goto-day" data-date="${ds}" title="${esc(t.text)}${t.note?' · '+esc(t.note):''}">
    ${lead}<span class="wk-t">${esc(t.text)}</span></div>`;
}
function renderWeek(visible){
  const base=parseYmd(state.ui.selectedDate),start=new Date(base);
  start.setDate(base.getDate()-base.getDay());   // 일요일 시작
  const today=todayYmd();const wdCls=['sun','','','','','','sat'];let cols='';
  for(let i=0;i<7;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);const ds=ymd(d),dow=d.getDay();
    const items=visible.filter(t=>spansDate(t,ds)).sort(cmpItems);
    const isT=ds===today;
    const body=items.length?items.map(t=>weekItemHTML(t,ds)).join(''):'<div class="wk-empty">—</div>';
    cols+=`<div class="wk-col${isT?' today':''}">
      <div class="wk-head" data-action="goto-day" data-date="${ds}" title="${ds} 상세 보기">
        <span class="d ${wdCls[dow]}">${d.getDate()}${isT?' · 오늘':''}</span>
        <span class="wd">${d.getMonth()+1}월 (${WD[dow]})</span>
      </div>
      <div class="wk-body">${body}</div>
    </div>`;
  }
  return `<div class="wk">${cols}</div>`;
}
function renderMonth(visible){
  const base=parseYmd(state.ui.selectedDate),y=base.getFullYear(),m=base.getMonth();
  const lead=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),today=todayYmd();
  const wdCls=['sun','','','','','','sat'];
  let cells='';
  for(let i=0;i<7;i++)cells+=`<div class="cal-wd ${wdCls[i]}">${WD[i]}</div>`;
  for(let i=0;i<lead;i++)cells+='<div class="cal-cell blank"></div>';
  const MAX=3;
  for(let dn=1;dn<=dim;dn++){
    const d=new Date(y,m,dn),ds=ymd(d),dow=d.getDay();
    const items=visible.filter(t=>spansDate(t,ds)).sort(cmpItems);
    let chips='';
    items.slice(0,MAX).forEach(t=>{
      const pr=projectById(t.project),ev=isEvent(t);
      const pc=pr.real?pr.color:'var(--line-strong)';
      const cls='cal-chip'+(ev?' ev':(t.done?' done':''));
      const label=ev?`${t.time?esc(t.time)+' ':''}${esc(t.text)}`:esc(t.text);
      chips+=`<div class="${cls}" style="--pc:${pc}" title="${esc(t.text)}">${label}</div>`;
    });
    if(items.length>MAX)chips+=`<div class="cal-more">+${items.length-MAX}</div>`;
    cells+=`<div class="cal-cell${ds===today?' today':''}" data-action="goto-day" data-date="${ds}">
      <div class="cal-daynum ${wdCls[dow]}">${dn}</div>${chips}</div>`;
  }
  return `<div class="cal">${cells}</div>`;
}

function shiftDate(dir){
  const x=parseYmd(state.ui.selectedDate),period=state.ui.period||'day';
  if(period==='week')x.setDate(x.getDate()+dir*7);
  else if(period==='month'){x.setDate(1);x.setMonth(x.getMonth()+dir);}
  else x.setDate(x.getDate()+dir);
  state.ui.selectedDate=ymd(x);Store.prefs.save();syncHeader();renderList();
}
function toggleDone(id){const t=taskById(id);if(!t||isEvent(t))return;const nd=!t.done;Store.tasks.update(id,{done:nd,doneAt:nd?todayYmd():null});renderProjects();renderList();}
function delTask(id){const t=taskById(id);if(!t)return;if(state.ui.editingId===id)state.ui.editingId=null;Store.tasks.remove(id);renderProjects();renderList();}
function saveEdit(id){
  const t=taskById(id);if(!t)return;
  const newText=($('ef-text').value.trim())||t.text;
  const type=$('ef-type').value==='event'?'event':'task';
  let sd=$('ef-date').value||null,ed=$('ef-dateEnd').value||null;
  if(!sd&&ed){sd=ed;ed=null;}                        // 시작 없이 종료만 입력 → 그 날짜를 날짜로(단일). 입력한 날짜를 버리지 않음
  else if(sd&&ed&&ed<sd){const tmp=sd;sd=ed;ed=tmp;} // 종료<시작 → 두 날짜 자동 정렬
  if(ed&&ed===sd)ed=null;                            // 시작=종료 → 하루짜리
  const patch={text:newText,type,project:$('ef-proj').value,date:sd,endDate:ed,time:type==='event'?($('ef-time').value||null):null,note:$('ef-note').value.trim()};
  if(type!=='event')patch.priority=$('ef-pri').value;
  if(type==='event'&&t.done){patch.done=false;patch.doneAt=null;}   // 일정으로 바꾸면 완료상태 해제
  Store.tasks.update(id,patch);
  state.ui.editingId=null;renderProjects();renderList();
}

function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),1800);}

function exportJSON(){
  const blob=new Blob([JSON.stringify(Store.snapshot(),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`makers-tasks-${ymd(new Date())}.json`;a.click();URL.revokeObjectURL(url);
  toast('백업 파일을 내려받았어요');
}
function importJSON(file){
  if(Store.mode!=='local'){toast('원격 모드에선 백업 불러오기를 아직 지원하지 않아요');return;}
  const r=new FileReader();
  r.onload=()=>{try{Store.importState(JSON.parse(r.result));render();toast('데이터를 불러왔어요');}catch(e){toast('파일을 읽을 수 없어요');}};
  r.readAsText(file);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('마크다운을 복사했어요');}catch(e){toast('복사 실패 — 백업을 이용하세요');}
  document.body.removeChild(ta);
}
function exportMD(){
  const lines=['# MAKERS 할 일 · 일정',''],by={};
  state.tasks.filter(t=>isEvent(t)||!t.done).forEach(t=>{const k=t.date||'날짜 미정';(by[k]=by[k]||[]).push(t);});
  Object.keys(by).sort().forEach(k=>{
    lines.push(`## ${k}`);
    by[k].sort(cmpItems).forEach(t=>{const p=projectById(t.project);
      if(isEvent(t)){lines.push(`- 📅 ${t.time?t.time+' ':''}${p.real?`[${p.name}] `:''}${t.text}`);return;}
      const r=(t.endDate&&t.endDate>t.date)?` (${md(t.date)}~${md(t.endDate)})`:'';
      lines.push(`- [ ] ${PRI_EMOJI[t.priority]} ${p.real?`[${p.name}] `:''}${t.text}${r}`);});
    lines.push('');
  });
  const md=lines.join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(md).then(()=>toast('마크다운을 복사했어요')).catch(()=>fallbackCopy(md));
  else fallbackCopy(md);
}

      let nd,ne;
      if(t.endDate&&t.endDate>t.date){ // 지정 기간: 통째로 +1일(기간 길이 유지)
        const d=parseYmd(t.date);d.setDate(d.getDate()+1);nd=ymd(d);
        const e=parseYmd(t.endDate);e.setDate(e.getDate()+1);ne=ymd(e);

let dragId=null;
function clearDropMarks(){listContainer.querySelectorAll('.drop-before,.drop-after').forEach(el=>el.classList.remove('drop-before','drop-after'));}
function reorderTask(srcId,targetId,after){
  if(!state)return;
  const ts=state.tasks.slice();const from=ts.findIndex(t=>t.id===srcId);if(from<0)return;
  const[moved]=ts.splice(from,1);
  let to=ts.findIndex(t=>t.id===targetId);
  if(to<0){ts.push(moved);}else{if(after)to++;ts.splice(to,0,moved);}
  Store.tasks.setAll(ts);renderList();
}

listContainer.addEventListener('dragover',e=>{if(dragId==null)return;const card=e.target.closest('.task');if(!card)return;e.preventDefault();if(card.dataset.id===dragId){clearDropMarks();return;}const r=card.getBoundingClientRect();const after=(e.clientY-r.top)>r.height/2;clearDropMarks();card.classList.add(after?'drop-after':'drop-before');});
listContainer.addEventListener('drop',e=>{if(dragId==null)return;e.preventDefault();const card=e.target.closest('.task');clearDropMarks();if(card&&card.dataset.id!==dragId){const r=card.getBoundingClientRect();const after=(e.clientY-r.top)>r.height/2;reorderTask(dragId,card.dataset.id,after);}dragId=null;});

/* ---------- 일회성 추가(시드) ----------
   여기에 항목을 넣어두면 새로고침 때 '한 번만' 보드에 추가됩니다.
   (각 항목의 seed id로 중복을 막으므로 여러 번 새로고침해도 안전)
   보드에 반영된 뒤에는 이 배열을 비워도 됩니다. project는 이름으로 매칭(없으면 '프로젝트 없음'). */
const PENDING_SEEDS=[
  {seed:'20260626-1',  date:'2026-06-26', text:'상판 컬러 배치', done:true},
  {seed:'20260626-1b', date:'2026-06-26', text:'책상 번호 배치'},
  {seed:'20260626-2',  date:'2026-06-26', text:'휴대폰보관함'},
  {seed:'20260626-3',  date:'2026-06-26', text:'카운터'},
  {seed:'20260629-lg', date:'2026-06-29', text:'LG 유플러스 인터넷 설치 확인', project:'대치5호점'},
];
function applySeeds(){
  const have=new Set(state.tasks.map(t=>t.seed).filter(Boolean));
  PENDING_SEEDS.forEach((s,i)=>{
    if(have.has(s.seed))return;
    const proj=s.project?(state.projects.find(p=>p.name===s.project)||{}).id||'none':'none';
    state.tasks.push({id:uid(),seed:s.seed,text:s.text,project:proj,priority:s.priority||'mid',
      done:!!s.done,createdAt:Date.now()+i,date:s.date||null,endDate:s.endDate||null,doneAt:null,note:''});
  });
  // 영속화는 boot()의 단일 Store.bulk()가 일괄 처리 (변경 여부와 무관하게 1회 안전 기록)
}
/* ---------- 일회성 보정(마이그레이션) ----------
   이미 보드에 반영된 항목을 한 번만 수정. 조건문이 idempotent라 여러 번 실행해도 안전. */
function applyMigrations(){
  // 합쳐져 있던 '상판 컬러 배치 & 책상 번호'를 → '상판 컬러 배치'(완료)로 바꾸고, 책상 번호는 위 시드(20260626-1b)로 분리됨
  const c=state.tasks.find(t=>t.seed==='20260626-1'&&t.text.includes('&'));
  if(c){c.text='상판 컬러 배치';c.done=true;}
  // '완료 항목 보기' 기본 ON — 기존 보드도 딱 한 번만 켜줌(이후 사용자가 끄면 그 선택을 유지)
  if(!state.ui._defShowDone){state.ui.showDone=true;state.ui._defShowDone=true;}
  // 모든 할일을 '대치5호점'으로 일괄 재배정 — 딱 한 번(이후 사용자가 추가/변경한 프로젝트는 유지)
  if(!state.ui._allToDaechi5){
    const d5=state.projects.find(p=>p.name==='대치5호점');
    if(d5){state.tasks.forEach(t=>{t.project=d5.id;});state.ui._allToDaechi5=true;}
  }
  // 'ini' 프로젝트 생성 + '이니 메이크업 9:30' 오늘 완료 상태로 추가 — 딱 한 번.
  // (위 대치5호점 일괄 재배정 '이후'에 추가하므로 ini 할당이 덮어쓰이지 않음. seed로도 한 번 더 중복방지)
  if(!state.ui._iniAdded && !state.tasks.some(t=>t.seed==='20260627-ini')){
    let ini=state.projects.find(p=>p.name==='ini');
    if(!ini){ini={id:uid(),name:'ini',color:'#ff6b9d'};state.projects.push(ini);}
    state.tasks.push({id:uid(),seed:'20260627-ini',text:'이니 메이크업 9:30',project:ini.id,priority:'mid',
      done:true,createdAt:Date.now(),date:'2026-06-27',endDate:null,doneAt:'2026-06-27',note:''});
    state.ui._iniAdded=true;
  }
  // 영속화는 boot()의 단일 Store.bulk()가 일괄 처리
}
function ensureDaechi5(){ // '대치5호점' 프로젝트 보장 (딱 한 번만 생성)
  if(state.ui._daechi5Added)return;
  if(!state.projects.find(p=>p.name==='대치5호점'))
    state.projects.push({id:uid(),name:'대치5호점',color:'#ff8a5c'});
  state.ui._daechi5Added=true; // 영속화는 boot()의 Store.bulk()가 처리
}

/* ---------- 로그인 / 계정 ---------- */
function showLogin(show){const ls=$('loginScreen');if(!ls)return;ls.hidden=!show;const app=document.querySelector('.app');if(app)app.style.display=show?'none':'';}
function hideLogin(){showLogin(false);}
function showPw(show){const el=$('pwScreen');if(el)el.hidden=!show;}
function updateAccountUI(){
  const acct=$('acctRow');if(!acct)return;
  const u=(Store.mode!=='local'&&Store.auth.isAuthenticated())?Store.auth.currentUser():null;
  acct.hidden=!u; if(u)$('acctEmail').textContent=(u.email||'로그인됨');
}
async function maybeOfferMigration(){ // 첫 로그인 + 클라우드 비어있음 + 로컬데이터 있음 → 1회 업로드 제안
  if(state.ui._uploadedToCloud)return;
  const local=Store.localData();
  const hasLocal=local&&((local.tasks&&local.tasks.length)||(local.projects&&local.projects.length));
  const cloudEmpty=state.tasks.length===0&&state.projects.length===0;
  if(hasLocal&&cloudEmpty&&confirm('이 브라우저에 저장돼 있던 기존 할일/프로젝트를 클라우드 계정으로 올릴까요?\n(프로젝트는 팀 공유로 올라갑니다. 나중에 개인으로 바꿀 수 있어요.)')){
    try{ const n=await Store.migrateLocalToCloud(); toast(`올렸어요 — 프로젝트 ${n.projects} · 할일 ${n.tasks}`); }
    catch(e){ toast('업로드 실패 — 잠시 후 다시 시도해 주세요'); return; }
  }
  state.ui._uploadedToCloud=true; Store.prefs.save();
}
async function enterApp(){
  hideLogin();
  state=Store.facade();
  if(Store.mode!=='local')await maybeOfferMigration();
  updateAccountUI();
  render();
  toggleAddType();
  addText.focus();
}
const loginForm=$('loginForm');
if(loginForm)loginForm.addEventListener('submit',async e=>{
  e.preventDefault();
  const isSignup=$('loginTitle').textContent.indexOf('회원가입')>=0;
  const err=$('loginErr');err.hidden=true;
  const btn=$('loginSubmit');btn.disabled=true;
  try{
    await (isSignup?Store.auth.signup:Store.auth.signin).call(Store.auth,$('loginEmail').value.trim(),$('loginPw').value);
    await enterApp();
  }catch(ex){err.textContent=(ex&&ex.message)?('실패: '+ex.message):'로그인에 실패했어요';err.hidden=false;}
  finally{btn.disabled=false;}
});
const pwForm=$('pwForm');
if(pwForm)pwForm.addEventListener('submit',async e=>{
  e.preventDefault();
  const np=$('pwNew').value, np2=$('pwNew2').value, err=$('pwErr');err.hidden=true;
  if(np.length<6){err.textContent='6자 이상 입력해 주세요';err.hidden=false;return;}
  if(np!==np2){err.textContent='두 비밀번호가 일치하지 않아요';err.hidden=false;return;}
  const btn=$('pwSubmit');btn.disabled=true;
  try{ await Store.auth.changePassword(np); showPw(false); toast('비밀번호를 변경했어요'); }
  catch(ex){ err.textContent=(ex&&ex.message)?('실패: '+ex.message):'변경에 실패했어요'; err.hidden=false; }
  finally{ btn.disabled=false; }
});

/* ---------- 프로젝트 공유 설정 (생성자만 · 멤버 목록 편집) ---------- */
let _shareProjId=null;
function updateShareMembersVis(){ const b=$('shareMembers'); if(b)b.hidden=$('shareMode').value!=='list'; }
async function openShareConfig(pid){
  const p=state.projects.find(x=>x.id===pid); if(!p)return;
  _shareProjId=pid;
  $('shareTitle').textContent=`‘${p.name}’ 공유 설정`;
  $('shareMode').value = p.shared===true ? 'team' : ((p.members&&p.members.length)?'list':'personal');
  $('shareErr').hidden=true;
  const box=$('shareMembers'); box.innerHTML='<div class="empty-dir">불러오는 중…</div>';
  updateShareMembersVis();
  $('shareScreen').hidden=false;
  let dir=[];
  try{ dir=await Store.directory(); }
  catch(e){ if(_shareProjId===pid)box.innerHTML='<div class="empty-dir">가입자 목록을 불러오지 못했어요.</div>'; return; }
  if(_shareProjId!==pid)return;                      // 그새 닫힘/전환
  const me=Store.auth.currentUser(), meId=me?me.id:null;
  const others=dir.filter(u=>u.id!==meId && !/@example\.com$/i.test(u.email||'')); // 테스트 계정(@example.com) 숨김
  const sel=new Set(p.members||[]);
  box.innerHTML = others.length
    ? others.map(u=>`<label><input type="checkbox" value="${u.id}"${sel.has(u.id)?' checked':''}> ${esc(u.email||u.id)}</label>`).join('')
    : '<div class="empty-dir">공유할 다른 가입자가 없어요.<br>(상대가 먼저 이 보드에 가입해야 해요)</div>';
}
const shareForm=$('shareForm');
if(shareForm)shareForm.addEventListener('submit',e=>{
  e.preventDefault(); if(!_shareProjId)return;
  const mode=$('shareMode').value;
  let shared=false, members=[];
  if(mode==='team'){ shared=true; members=[]; }
  else if(mode==='list'){ members=Array.from($('shareMembers').querySelectorAll('input[type=checkbox]:checked')).map(i=>i.value); }
  const p=state.projects.find(x=>x.id===_shareProjId);
  Store.projects.update(_shareProjId,{shared,members});
  $('shareScreen').hidden=true; _shareProjId=null;
  renderProjects();renderList();
  toast(`‘${p?p.name:''}’ 공유 설정 저장`);
});

/* ---------- 시작 ---------- */
async function boot(){
  Store.onChange(render);                                        // 원격 비동기 갱신 시 재렌더
  await Store.init();                                            // 로컬: 마이크로태스크 즉시 resolve / 원격: 토큰 있으면 클라우드 적재
  state=Store.facade();                                          // 별칭 1회 바인딩
  if(Store.mode==='local'){ Store.bulk(function(){ ensureDaechi5();applySeeds();applyMigrations(); }); } // 시드/마이그는 로컬 모드만
  if(Store.auth.requiresLogin()){ showLogin(true); updateAccountUI(); return; } // 원격+미로그인 → 로그인 화면
  await enterApp();
}
boot();
</script>
